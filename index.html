<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MTR Timetable Display</title>
  <style>
    /* ── RESET & FULLSCREEN LOCK ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Fluid unit constrained by BOTH width and height.
       1.78 ≈ 16/9, so on a standard landscape screen 1vw ≈ 1.78vh.
       min() picks the more limiting dimension, so text and spacing
       also shrink when the screen is short (small height).
       Declared on :root so fixed/overlay elements (e.g. dropdown)
       can also resolve it. */
    :root { --mtr-u: min(1vw, 1.78vh); }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden; /* NO scrolling */
      font-family: 'MTR EN';
      background: #000;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── CUSTOM FONTS ── */

    @font-face {
      font-family: 'MTR EN';
      src: url('assets/fonts/mtr.woff2') format('woff2');
      font-display: swap;
    }

    /* ── MAIN CONTAINER: full viewport, flex column ── */
    .mtr-container {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── ROW 1: HEADER (Line & Station selector + Clock) ── */
    .mtr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 18vh; /* ~18% of viewport height */
      padding: 0 calc(3 * var(--mtr-u));
      flex-shrink: 0;
      transition: background-color 0.4s ease;
      gap: calc(2 * var(--mtr-u));
    }
    .mtr-header-left {
      display: flex;
      align-items: center;
      gap: calc(2 * var(--mtr-u));
      min-width: 0;       /* allow flex children to shrink below content size */
      flex: 1 1 auto;     /* take available space, but can shrink */
      overflow: hidden;   /* hide any momentary overflow while JS resizes */
    }
    .mtr-header-label {
      font-size: clamp(2.5rem, calc(6 * var(--mtr-u)), 5rem);
      font-weight: 400;
      color: #FFFFFF;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.2s;
      line-height: 1;
      white-space: nowrap;   /* keep on one line; JS will shrink font instead */
      flex-shrink: 1;
      min-width: 0;
    }
    .mtr-header-label:hover { opacity: 0.85; }
    .mtr-header-sep {
      font-size: clamp(2.5rem, calc(6 * var(--mtr-u)), 5rem);
      color: #FFFFFF;
      font-weight: 300;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .mtr-header-clock {
      font-size: clamp(3rem, calc(7 * var(--mtr-u)), 6rem);
      font-weight: 400;
      color: #FFFFFF;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      font-family: 'MTR EN';
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── DROPDOWN OVERLAY ── */
    .mtr-dropdown-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .mtr-dropdown-overlay.active { display: flex; }
    .mtr-dropdown-panel {
      background: #1a1a2e;
      border-radius: 1.5rem;
      padding: 3vh calc(4 * var(--mtr-u));
      max-height: 80vh;
      overflow-y: auto;
      min-width: 70vw;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .mtr-dropdown-panel h3 {
      color: #fff;
      font-size: clamp(1.5rem, calc(3 * var(--mtr-u)), 2.5rem);
      margin-bottom: 2vh;
      text-align: center;
    }
    .mtr-line-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5vh calc(2 * var(--mtr-u));
    }
    .mtr-line-group {
      border-radius: 1rem;
      padding: 1.5vh calc(1.5 * var(--mtr-u));
    }
    .mtr-line-group-title {
      font-size: clamp(1.2rem, calc(2.5 * var(--mtr-u)), 2rem);
      font-weight: 400;
      color: #FFFFFF;
      margin-bottom: 1vh;
      padding-bottom: 0.5vh;
      border-bottom: 2px solid rgba(255,255,255,0.3);
    }
    .mtr-station-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8vh calc(1 * var(--mtr-u));
    }
    .mtr-station-btn {
      background: rgba(255,255,255,0.15);
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 0.6rem;
      padding: 0.6vh calc(1.2 * var(--mtr-u));
      font-size: clamp(1rem, calc(2 * var(--mtr-u)), 1.6rem);
      cursor: pointer;
      font-family: 'MTR EN';
      transition: background 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .mtr-station-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    .mtr-station-btn.selected {
      background: #FFFFFF;
      color: #000;
      font-weight: 400;
    }
    .mtr-dropdown-close {
      display: block;
      margin: 2vh auto 0;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      border-radius: 2rem;
      padding: 1vh calc(4 * var(--mtr-u));
      font-size: clamp(1.2rem, calc(2.5 * var(--mtr-u)), 2rem);
      cursor: pointer;
      font-family: 'MTR EN';
      transition: background 0.15s;
    }
    .mtr-dropdown-close:hover { background: rgba(255,255,255,0.4); }

    /* ── ROWS 2-5: TIMETABLE ── */
    .mtr-row {
      display: flex;
      align-items: center;
      height: 20.5vh; /* 4 rows fill remaining ~82vh */
      padding: 0 calc(3 * var(--mtr-u));
      flex-shrink: 0;
      position: relative;
    }
    .mtr-row-2 { background: #D3EFFE; }
    .mtr-row-3 { background: #97e3ff; }
    .mtr-row-4 { background: #D3EFFE; }
    .mtr-row-5 { background: #97e3ff; }

    /* thick black line between row 3 and row 4 */
    .mtr-divider {
      height: 0.6vh;
      background: #000;
      flex-shrink: 0;
    }

    .mtr-row-dest {
      font-size: clamp(2.5rem, calc(6 * var(--mtr-u)), 5.5rem);
      font-weight: 400;
      color: #000000;
      flex: 1;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }
    .mtr-row-platform {
      display: flex;
      align-items: center;
      justify-content: center;
      /* Width/height limited by BOTH viewport width (12vw) and row height.
         16vh ≈ row-height(20.5vh) × 0.78, leaving ~11% margin top & bottom. */
      width:  clamp(70px,  min(12vw, 16vh), 110px);
      height: clamp(70px,  min(12vw, 16vh), 110px);
      border-radius: 50%;
      font-size: clamp(2.5rem, calc(5 * var(--mtr-u)), 4rem);
      font-weight: 400;
      color: #FFFFFF;
      margin: 0 calc(2 * var(--mtr-u));
      flex-shrink: 0;
      transition: background-color 0.4s ease;
    }
    .mtr-row-eta {
      font-size: clamp(2.5rem, calc(6 * var(--mtr-u)), 5.5rem);
      font-weight: 400;
      color: #000000;
      min-width: clamp(240px, 36vw, 460px);
      text-align: right;
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    /* ── LOADING / EMPTY STATE ── */
    .mtr-row-placeholder {
      font-size: clamp(2rem, calc(4 * var(--mtr-u)), 3.5rem);
      color: rgba(0,0,0,0.4);
      font-weight: 500;
      flex: 1;
      text-align: center;
    }

    /* ── RESPONSIVE: portrait orientation ── */
    @media (orientation: portrait) {
      .mtr-header { height: 14vh; }
      .mtr-row { height: 21vh; }
      .mtr-header-label { font-size: clamp(2rem, calc(5 * var(--mtr-u)), 3.5rem); }
      .mtr-header-clock { font-size: clamp(2.5rem, calc(6 * var(--mtr-u)), 5rem); }
      .mtr-row-dest { font-size: clamp(2rem, calc(5 * var(--mtr-u)), 4rem); }
      .mtr-row-platform {
        width:  clamp(60px, min(10vw, 16vh), 90px);
        height: clamp(60px, min(10vw, 16vh), 90px);
        font-size: clamp(2rem, calc(4 * var(--mtr-u)), 3rem);
      }
      .mtr-row-eta { font-size: clamp(2rem, calc(5 * var(--mtr-u)), 4rem); min-width: clamp(160px, 24vw, 300px); }
    }
  </style>
</head>

  </div>

</div>

<!-- ══ DROPDOWN OVERLAY ══ -->
<div class="mtr-dropdown-overlay" id="mtrDropdownOverlay" onclick="closeDropdownOutside(event)">

    <div class="mtr-line-grid" id="mtrLineGrid"></div>
    <button class="mtr-dropdown-close" onclick="closeDropdown()">關閉 Close ✕</button>
  </div>
</div>

  {line:'DRL',sta:'SUN',zh:'欣澳',en:'Sunny Bay'},
  {line:'DRL',sta:'DIS',zh:'迪士尼',en:'Disneyland Resort'},
];

/* ── Destination station name lookup ── */
const STA_ZH = {};
const STA_EN = {};
STATIONS.forEach(s => { STA_ZH[s.sta] = s.zh; STA_EN[s.sta] = s.en; });
// Add missing codes
const EXTRA = {
  NTK:'牛頭角', TKO:'將軍澳', LHP:'康城', HAH:'坑口', POA:'寶琳',
  TUC:'東涌', AIR:'機場', AWE:'博覽館', TUM:'屯門', SIH:'兆康',
  TIS:'天水圍', LOP:'朗屏', YUL:'元朗', KSR:'錦上路', TWW:'荃灣西',
  AUS:'柯士甸', ETS:'尖東', TKW:'土瓜灣', SUW:'宋皇臺', KAT:'啟德',
  HIK:'顯徑', CKT:'車公廟', STW:'沙田圍', CIO:'第一城', SHM:'石門',
  TSH:'大水坑', HEO:'恆安', MOS:'馬鞍山', WKS:'烏溪沙',
  OCP:'海洋公園', WCH:'黃竹坑', LET:'利東', SOH:'海怡半島',
  DIS:'迪士尼', EXC:'會展', RAC:'馬場', LMC:'落馬洲', LOW:'羅湖',
};
const EXTRA_EN = {
  NTK:'Ngau Tau Kok', TKO:'Tseung Kwan O', LHP:'LOHAS Park', HAH:'Hang Hau', POA:'Po Lam',
  TUC:'Tung Chung', AIR:'Airport', AWE:'AsiaWorld-Expo', TUM:'Tuen Mun', SIH:'Siu Hong',
  TIS:'Tin Shui Wai', LOP:'Long Ping', YUL:'Yuen Long', KSR:'Kam Sheung Road', TWW:'Tsuen Wan West',
  AUS:'Austin', ETS:'East Tsim Sha Tsui', TKW:'To Kwa Wan', SUW:'Sung Wong Toi', KAT:'Kai Tak',
  HIK:'Hin Keng', CKT:'Che Kung Temple', STW:'Sha Tin Wai', CIO:'City One', SHM:'Shek Mun',
  TSH:'Tai Shui Hang', HEO:'Heng On', MOS:'Ma On Shan', WKS:'Wu Kai Sha',
  OCP:'Ocean Park', WCH:'Wong Chuk Hang', LET:'Lei Tung', SOH:'South Horizons',
  DIS:'Disneyland Resort', EXC:'Exhibition Centre', RAC:'Racecourse', LMC:'Lok Ma Chau', LOW:'Lo Wu',
};
Object.assign(STA_ZH, EXTRA);
Object.assign(STA_EN, EXTRA_EN);

function getStaName(code, lang) {
  if (lang === 'en') return STA_EN[code] || code;
  return STA_ZH[code] || code;
}

/* ── Get line info ── */
function getLineInfo(code) {
  return LINES.find(l => l.code === code) || { code, zh:code, en:code, color:'#888888' };
}

/* ── Current selection ── */
let currentLine = 'TCL';
let currentSta  = 'TSY';
let currentLang = 'zh'; // 'zh' or 'en'
let langTimer   = null;
let refreshTimer = null;

/* ── DOM refs ── */
const $ = id => document.getElementById(id);

/* ── Update header color based on line ── */
function updateHeaderColor() {
  const line = getLineInfo(currentLine);
  const header = $('mtrHeader');
  header.style.backgroundColor = line.color;
}

/* ── Update platform circle colors ── */
function updatePlatformColors() {
  const line = getLineInfo(currentLine);
  for (let i = 2; i <= 5; i++) {
    const plat = $('plat' + i);
    if (plat) plat.style.backgroundColor = line.color;
  }
}

/* ── Update header labels ── */
function updateHeaderLabels() {
  const line = getLineInfo(currentLine);
  const staEntry = STATIONS.find(s => s.line === currentLine && s.sta === currentSta);
  const staName = staEntry ? (currentLang === 'en' ? staEntry.en : staEntry.zh) : currentSta;
  $('mtrLineLabel').textContent = currentLang === 'en' ? line.en : line.zh;
  $('mtrStaLabel').textContent = staName;
  fitHeaderLabels();
}

/* ── Auto-shrink header label font-size so line + sep + station
       always fit on ONE line. Binary-searches the largest px size
       that still fits within the available width. ── */
function fitHeaderLabels() {
  const lineEl = $('mtrLineLabel');
  const sepEl  = document.querySelector('.mtr-header-sep');
  const staEl  = $('mtrStaLabel');
  const left   = document.querySelector('.mtr-header-left');
  if (!lineEl || !sepEl || !staEl || !left) return;

  const applySize = (px) => {
    const s = px + 'px';
    lineEl.style.fontSize = s;
    sepEl.style.fontSize  = s;
    staEl.style.fontSize  = s;
  };
  const fits = () =>
    lineEl.scrollWidth + sepEl.scrollWidth + staEl.scrollWidth <= left.clientWidth;

  // Start from the currently-clamped font-size, then shrink if needed.
  const maxPx = parseFloat(getComputedStyle(lineEl).fontSize) || 40;
  const minPx = maxPx * 0.4;
  applySize(maxPx);
  if (fits()) return;

  let lo = minPx, hi = maxPx;
  for (let i = 0; i < 12; i++) {
    const mid = (lo + hi) / 2;
    applySize(mid);
    if (fits()) lo = mid; else hi = mid;
  }
  applySize(lo);
}

/* Re-fit on window resize (throttled with rAF) */
let _resizeRaf = 0;
window.addEventListener('resize', () => {
  if (_resizeRaf) return;
  _resizeRaf = requestAnimationFrame(() => { _resizeRaf = 0; fitHeaderLabels(); });
});

/* ── Clock ── */
function updateClock() {
  const now = new Date();
  $('mtrClock').textContent = now.toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

/* ── Language toggle every 10 seconds ── */
function startLangToggle() {
  if (langTimer) clearInterval(langTimer);
  // Start with Chinese
  currentLang = 'zh';
  applyLang();
  langTimer = setInterval(function() {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    applyLang();
    // Re-render with current data
    renderCurrentData();
  }, 10000);
}

function applyLang() {
  updateHeaderLabels();
  updateDropdownContent();
}

/* ── Build dropdown content ── */
function buildDropdownContent() {
  const grid = $('mtrLineGrid');
  let html = '';
  LINES.forEach(function(line) {
    const stations = STATIONS.filter(s => s.line === line.code);
    if (!stations.length) return;
    const lineName = currentLang === 'en' ? line.en : line.zh;
    html += '<div class="mtr-line-group" style="background:' + line.color + '33; border:2px solid ' + line.color + '">';
    html += '<div class="mtr-line-group-title" style="color:' + line.color + '">' + lineName + '</div>';
    html += '<div class="mtr-station-list">';
    stations.forEach(function(s) {
      const name = currentLang === 'en' ? s.en : s.zh;
      const selClass = (currentLine === s.line && currentSta === s.sta) ? ' selected' : '';
      html += '<button class="mtr-station-btn' + selClass + '" onclick="selectStation(\'' + s.line + '\',\'' + s.sta + '\')" data-line="' + s.line + '" data-sta="' + s.sta + '">' + name + '</button>';
    });
    html += '</div></div>';
  });
  grid.innerHTML = html;
}

function updateDropdownContent() {
  // Update all station button texts and group titles
  const grid = $('mtrLineGrid');
  const groups = grid.querySelectorAll('.mtr-line-group');
  groups.forEach(function(group) {
    const title = group.querySelector('.mtr-line-group-title');
    const buttons = group.querySelectorAll('.mtr-station-btn');
    if (buttons.length > 0) {
      const lineCode = buttons[0].dataset.line;
      const line = getLineInfo(lineCode);
      if (title) title.textContent = currentLang === 'en' ? line.en : line.zh;
      buttons.forEach(function(btn) {
        const sLine = btn.dataset.line;
        const sSta  = btn.dataset.sta;
        const entry = STATIONS.find(s => s.line === sLine && s.sta === sSta);
        if (entry) btn.textContent = currentLang === 'en' ? entry.en : entry.zh;
      });
    }
  });
  // Update dropdown title
  const title = $('dropdownTitle');
  if (title) title.textContent = currentLang === 'en' ? 'Select Line & Station' : '選擇路線及車站';
}

/* ── Open/Close dropdown ── */
function openDropdown() {
  buildDropdownContent();
  $('mtrDropdownOverlay').classList.add('active');
}

function closeDropdown() {
  $('mtrDropdownOverlay').classList.remove('active');
}

function closeDropdownOutside(e) {
  if (e.target === $('mtrDropdownOverlay')) closeDropdown();
}

/* ── Select station from dropdown ── */
function selectStation(line, sta) {
  currentLine = line;
  currentSta  = sta;
  updateHeaderColor();
  updatePlatformColors();
  updateHeaderLabels();
  buildDropdownContent();
  fetchAndRender();
  closeDropdown();
}

/* ── Format ETA ── */
function formatEta(mins, lang) {
  const m = parseInt(mins, 10);
  if (isNaN(m) || m < 0) return '—';
  if (m === 0) return lang === 'en' ? 'Departing' : '即將開出';
  if (m === 1) return lang === 'en' ? 'Arriving' : '即將抵達';
  return lang === 'en' ? m + ' min' : m + ' 分鐘';
}

/* ── Fetch and render ── */
async function fetchAndRender() {
  // Show loading
  for (let i = 2; i <= 5; i++) {
    $('dest' + i).textContent = '—';
    $('plat' + i).textContent = '—';
    $('eta' + i).textContent = '—';
  }

  try {
    const url = MTR_API + '?line=' + encodeURIComponent(currentLine) + '&sta=' + encodeURIComponent(currentSta);
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    if (d.status === 0 || d.status === '0') {
      for (let i = 2; i <= 5; i++) {
        $('dest' + i).textContent = currentLang === 'en' ? 'No service' : '暫停服務';
        $('plat' + i).textContent = '—';
        $('eta' + i).textContent = '—';
      }
      return;
    }

    const key = currentLine + '-' + currentSta;
    const schedData = d.data && d.data[key];
    if (!schedData) {
      for (let i = 2; i <= 5; i++) {
        $('dest' + i).textContent = currentLang === 'en' ? 'No data' : '查無資料';
        $('plat' + i).textContent = '—';
        $('eta' + i).textContent = '—';
      }
      return;
    }

    const upTrains   = schedData['UP']   || [];
    const downTrains = schedData['DOWN'] || [];

    let rows = [];

    if (upTrains.length > 0 && downTrains.length > 0) {
      // Both directions: show first 2 UP + first 2 DOWN
      const up2   = upTrains.slice(0, 2);
      const down2 = downTrains.slice(0, 2);
      rows = [
        ...up2.map(function(t) { return { ...t, dir: 'UP' }; }),
        ...down2.map(function(t) { return { ...t, dir: 'DOWN' }; }),
      ];
    } else {
      // Only one direction: show up to 4
      const trains = upTrains.length > 0 ? upTrains : downTrains;
      const dir = upTrains.length > 0 ? 'UP' : 'DOWN';
      rows = trains.slice(0, 4).map(function(t) { return { ...t, dir: dir }; });
    }

    // Fill rows 2-5
    for (let i = 0; i < 4; i++) {
      const rowIdx = i + 2; // row 2,3,4,5
      const destEl = $('dest' + rowIdx);
      const platEl = $('plat' + rowIdx);
      const etaEl  = $('eta' + rowIdx);

      if (i < rows.length) {
        const t = rows[i];
        const destCode = t.dest || '';
        const destName = getStaName(destCode, currentLang);
        const plat = t.plat || '—';
        const mins = t.ttnt || '--';
        const etaText = formatEta(mins, currentLang);

        destEl.textContent = destName;
        platEl.textContent = plat;
        etaEl.textContent = etaText;
      } else {
        destEl.textContent = '—';
        platEl.textContent = '—';
        etaEl.textContent = '—';
      }
    }
  } catch (e) {
    console.error('MTR fetch error:', e);
    for (let i = 2; i <= 5; i++) {
      $('dest' + i).textContent = currentLang === 'en' ? 'Error' : '無法連接';
      $('plat' + i).textContent = '—';
      $('eta' + i).textContent = '—';
    }
  }
}

/* ── Render with current data (for lang toggle) ── */
function renderCurrentData() {
  // Re-fetch to get fresh data with correct language display
  fetchAndRender();
}

/* ── Auto refresh every 30 seconds ── */
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() {
    fetchAndRender();
  }, 30000);
}

/* ── Init ── */
function init() {
  updateHeaderColor();
  updatePlatformColors();
  updateHeaderLabels();
  buildDropdownContent();
  fetchAndRender();
  startLangToggle();
  startAutoRefresh();
}

// Expose functions to global scope for onclick handlers
window.openDropdown = openDropdown;
window.closeDropdown = closeDropdown;
window.closeDropdownOutside = closeDropdownOutside;
window.selectStation = selectStation;

document.addEventListener('DOMContentLoaded', init);
</script>
